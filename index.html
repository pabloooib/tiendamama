<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANGELICA MARKET · Colección Ultra Premium</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-display: 'Syne', sans-serif;
            --transition-fluid: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-bounce: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            --radius-xl: 32px;
            --radius-lg: 24px;
            --radius-md: 16px;
            
            /* Dark Luxury Theme Config (Estilo Apple / Linear / Framer) */
            --bg-app: #030303;
            --bg-card: rgba(10, 10, 12, 0.45);
            --bg-card-elevated: rgba(20, 20, 25, 0.85);
            --bg-navbar: rgba(3, 3, 3, 0.7);
            --border-primary: rgba(255, 255, 255, 0.05);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text-title: #ffffff;
            --text-body: #94a3b8;
            --text-muted: #64748b;
            --brand-gold: #c5a880;
            --brand-gold-glow: rgba(197, 168, 128, 0.25);
            --whatsapp-green: #25d366;
            --whatsapp-hover: #1fbe58;
            --accent-bg: #ffffff;
            --accent-text: #000000;
            --shadow-luxury: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            --blur-glass: blur(24px);
            --glow-color: rgba(255, 255, 255, 0.03);
        }

        [data-theme="light"] {
            --bg-app: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.65);
            --bg-card-elevated: rgba(255, 255, 255, 0.95);
            --bg-navbar: rgba(248, 250, 252, 0.7);
            --border-primary: rgba(15, 23, 42, 0.06);
            --border-hover: rgba(15, 23, 42, 0.15);
            --text-title: #0f172a;
            --text-body: #475569;
            --text-muted: #94a3b8;
            --brand-gold: #b39266;
            --brand-gold-glow: rgba(179, 146, 102, 0.15);
            --accent-bg: #0f172a;
            --accent-text: #ffffff;
            --shadow-luxury: 0 30px 60px rgba(15, 23, 42, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            --glow-color: rgba(15, 23, 42, 0.01);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: var(--font-main);
        }
        
        body { 
            background-color: var(--bg-app); 
            color: var(--text-body); 
            transition: var(--transition-fluid); 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
            background-image: 
                radial-gradient(circle at 50% -20%, var(--glow-color) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, var(--glow-color) 0%, transparent 40%);
            background-attachment: fixed;
        }

        /* BARRA DE DESPLAZAMIENTO PREMIUM */
        ::-webkit-scrollbar { 
            width: 8px; 
            height: 8px;
        }
        ::-webkit-scrollbar-track { 
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb { 
            background: var(--border-primary); 
            border-radius: 10px; 
            border: 2px solid var(--bg-app);
        }
        ::-webkit-scrollbar-thumb:hover { 
            background: var(--text-muted); 
        }

        /* HEADER & NAVBAR DESIGN (GLASSMORPHISM EXTRACTO) */
        .navbar {
            position: fixed;
            top: 0; left: 0; width: 100%; z-index: 1000;
            background: var(--bg-navbar); 
            backdrop-filter: var(--blur-glass); 
            -webkit-backdrop-filter: var(--blur-glass);
            border-bottom: 1px solid var(--border-primary);
            transition: var(--transition-fluid);
        }
        
        .navbar.scrolled {
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-bottom-color: var(--border-hover);
        }
        
        .nav-inner { 
            max-width: 1440px; 
            margin: 0 auto; 
            padding: 24px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        
        .nav-logo {
            font-family: var(--font-display);
            font-weight: 800; 
            font-size: 1.4rem; 
            letter-spacing: 2px;
            color: var(--text-title); 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 16px; 
            cursor: pointer;
        }
        
        .logo-symbol {
            width: 42px;
            height: 42px; 
            background: linear-gradient(135deg, var(--brand-gold) 0%, var(--text-title) 100%);
            color: var(--bg-app);
            display: grid; 
            place-items: center; 
            border-radius: 16px; 
            font-weight: 800; 
            font-size: 1.2rem;
            transition: var(--transition-fluid);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        
        .nav-logo:hover .logo-symbol { 
            transform: scale(1.08) rotate(5deg);
        }

        .nav-menu { 
            display: flex; 
            align-items: center; 
            gap: 16px;
        }
        
        .nav-action-btn {
            background: transparent;
            border: none; 
            color: var(--text-title); 
            width: 46px; 
            height: 46px;
            border-radius: 50%; 
            cursor: pointer; 
            display: grid; 
            place-items: center;
            font-size: 1.2rem;
            transition: var(--transition-fluid); 
            border: 1px solid var(--border-primary);
        }
        
        .nav-action-btn:hover { 
            background: var(--bg-card-elevated); 
            border-color: var(--border-hover);
            transform: scale(1.05);
        }

        /* DISEÑO DE CONTENEDOR HERO CINEMÁTICO */
        .hero-container { 
            max-width: 1440px;
            margin: 140px auto 40px auto; 
            padding: 0 40px; 
        }
        
        .premium-banner {
            position: relative;
            background: linear-gradient(-45deg, #050505, #0f0f15, #020202, #08080c);
            background-size: 400% 400%;
            animation: fluidGradient 20s ease infinite;
            color: #ffffff; 
            border-radius: var(--radius-xl);
            padding: 130px 100px; 
            overflow: hidden; 
            box-shadow: var(--shadow-luxury); 
            min-height: 540px; 
            display: flex;
            flex-direction: column; 
            justify-content: center;
            border: 1px solid var(--border-primary);
        }

        .premium-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 80% 20%, rgba(197, 168, 128, 0.12) 0%, transparent 60%);
            pointer-events: none;
        }
        
        @keyframes fluidGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .premium-banner h1 { 
            font-family: var(--font-display);
            font-size: 4.8rem; 
            font-weight: 800; 
            line-height: 1.1; 
            max-width: 850px; 
            margin-bottom: 28px; 
            letter-spacing: -3px;
            background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 50%, #64748b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        
        .premium-banner p { 
            color: #94a3b8;
            font-size: 1.35rem; 
            max-width: 640px; 
            margin-bottom: 48px; 
            line-height: 1.6;
            animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
        }

        .hero-action-wrapper {
            animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }

        /* GRID SHOP LAYOUT MODERNO */
        .shop-layout { 
            max-width: 1440px;
            margin: 0 auto; 
            padding: 40px 40px 140px 40px; 
            display: grid; 
            grid-template-columns: 320px 1fr; 
            gap: 60px;
        }
        
        .shop-sidebar { 
            display: flex;
            flex-direction: column; 
            gap: 44px; 
        }

        .sidebar-sticky {
            position: sticky;
            top: 130px;
            display: flex;
            flex-direction: column;
            gap: 44px;
        }
        
        .sidebar-block-title { 
            font-size: 0.75rem; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 3px; 
            color: var(--text-muted); 
            margin-bottom: 24px; 
        }
        
        .search-container { 
            position: relative;
        }
        
        .search-container i { 
            position: absolute; 
            left: 24px; 
            top: 50%; 
            transform: translateY(-50%);
            color: var(--text-muted); 
            font-size: 1rem;
        }
        
        .custom-search { 
            width: 100%; 
            padding: 20px 24px 20px 60px;
            background: var(--bg-card); 
            border: 1px solid var(--border-primary); 
            border-radius: var(--radius-md); 
            color: var(--text-title); 
            outline: none; 
            transition: var(--transition-fluid); 
            font-size: 1rem;
            backdrop-filter: var(--blur-glass);
        }
        
        .custom-search:focus { 
            border-color: var(--border-hover); 
            background: var(--bg-card-elevated);
            box-shadow: 0 0 0 1px var(--text-title), 0 20px 40px rgba(0,0,0,0.05);
        }

        .category-list-group { 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
        }
        
        .category-nav-link { 
            padding: 18px 24px; 
            border-radius: var(--radius-md); 
            color: var(--text-body); 
            font-weight: 600;
            font-size: 1rem; 
            cursor: pointer; 
            transition: var(--transition-fluid); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid transparent;
            background: var(--bg-card);
        }
        
        .category-nav-link:hover { 
            background: var(--bg-card-elevated); 
            color: var(--text-title); 
            border-color: var(--border-primary); 
            transform: translateX(8px);
        }
        
        .category-nav-link.active { 
            background: var(--accent-bg); 
            color: var(--accent-text); 
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .category-nav-link .count-pill { 
            font-size: 0.8rem; 
            background: var(--border-primary); 
            padding: 4px 14px; 
            border-radius: 20px;
            color: var(--text-muted); 
            font-weight: 700;
        }
        
        .category-nav-link.active .count-pill { 
            background: rgba(255,255,255,0.2); 
            color: var(--accent-text);
        }

        /* SHOWCASE ULTRA LUXURY CARDS */
        .products-showcase { 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 40px;
        }
        
        .product-luxury-card { 
            background: var(--bg-card);
            border: 1px solid var(--border-primary); 
            border-radius: var(--radius-lg); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            transition: var(--transition-fluid);
            position: relative;
            backdrop-filter: var(--blur-glass);
        }

        .product-luxury-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: var(--radius-lg);
            padding: 1px;
            background: linear-gradient(180deg, rgba(255,255,255,0.08), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: var(--transition-fluid);
        }
        
        .product-luxury-card:hover { 
            transform: translateY(-12px);
            border-color: var(--border-hover); 
            background: var(--bg-card-elevated);
            box-shadow: var(--shadow-luxury), 0 0 50px var(--brand-gold-glow); 
        }

        .product-luxury-card:hover::before {
            background: linear-gradient(180deg, rgba(255,255,255,0.22), transparent);
        }
        
        .card-media-wrapper { 
            width: 100%;
            height: 380px; 
            position: relative; 
            overflow: hidden; 
            background: linear-gradient(180deg, rgba(0,0,0,0) 60%, rgba(0,0,0,0.4) 100%);
        }
        
        .card-media-wrapper img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .product-luxury-card:hover .card-media-wrapper img { 
            transform: scale(1.06);
        }
        
        /* SISTEMA DE BADGES PREMIUM */
        .badge-container {
            position: absolute;
            top: 24px; left: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 5;
        }

        .discount-ribbon { 
            background: linear-gradient(135deg, var(--brand-gold) 0%, #a68458 100%); 
            color: white; 
            padding: 8px 16px; 
            font-size: 0.75rem; 
            font-weight: 800; 
            border-radius: 30px; 
            text-transform: uppercase;
            letter-spacing: 1px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); 
        }

        .whatsapp-direct-badge {
            background: rgba(3, 3, 3, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #ffffff;
            padding: 8px 16px;
            font-size: 0.72rem;
            font-weight: 700;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .whatsapp-direct-badge i {
            color: var(--whatsapp-green);
            font-size: 0.85rem;
        }

        .stock-out-overlay { 
            position: absolute;
            inset: 0; 
            background: rgba(3, 3, 3, 0.85); 
            backdrop-filter: blur(12px); 
            display: grid; 
            place-items: center; 
            z-index: 6;
        }
        
        .stock-out-badge { 
            background: #ef4444; 
            color: white; 
            padding: 12px 28px; 
            font-weight: 800;
            border-radius: 30px; 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
        }

        .card-info { 
            padding: 32px;
            display: flex; 
            flex-direction: column; 
            flex-grow: 1; 
        }
        
        .card-meta-tag { 
            font-size: 0.75rem; 
            font-weight: 800;
            text-transform: uppercase; 
            color: var(--brand-gold); 
            letter-spacing: 2px; 
            margin-bottom: 14px; 
        }
        
        .card-main-title { 
            font-size: 1.35rem;
            font-weight: 700; 
            color: var(--text-title); 
            margin-bottom: 20px; 
            line-height: 1.4; 
        }
        
        .card-pricing-block { 
            display: flex;
            align-items: baseline; 
            gap: 14px; 
            margin-top: auto; 
            margin-bottom: 28px; 
        }
        
        .price-current { 
            font-size: 1.7rem;
            font-weight: 700; 
            color: var(--text-title); 
            font-family: var(--font-main);
        }
        
        .price-was { 
            font-size: 1.1rem; 
            text-decoration: line-through; 
            color: var(--text-muted);
        }

        /* STRIPE / APPLE PREMIUM CORE BUTTONS */
        .btn { 
            padding: 18px 36px;
            border-radius: var(--radius-md); 
            font-weight: 700; 
            font-size: 1rem; 
            border: 1px solid transparent; 
            cursor: pointer; 
            transition: var(--transition-fluid); 
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            gap: 12px; 
            text-decoration: none; 
        }
        
        .btn-accent { 
            background: var(--accent-bg); 
            color: var(--accent-text);
        }
        
        .btn-accent:hover { 
            transform: translateY(-3px); 
            opacity: 0.95; 
            box-shadow: 0 15px 30px rgba(255,255,255,0.08);
        }
        
        [data-theme="light"] .btn-accent:hover { 
            box-shadow: 0 15px 30px rgba(15, 23, 42, 0.15);
        }
        
        .btn-outline { 
            background: transparent; 
            border-color: var(--border-primary); 
            color: var(--text-title);
        }
        
        .btn-outline:hover { 
            background: var(--border-primary); 
            border-color: var(--border-hover);
            transform: scale(1.02);
        }

        .btn-whatsapp {
            background: var(--whatsapp-green);
            color: #ffffff;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.2);
        }

        .btn-whatsapp:hover {
            background: var(--whatsapp-hover);
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(37, 211, 102, 0.4);
        }

        /* GLASSMORPHIC PRODUCT INSIGHT MODAL */
        .modal-blur-overlay { 
            position: fixed;
            inset: 0; 
            background: rgba(3, 3, 3, 0.85); 
            backdrop-filter: var(--blur-glass); 
            -webkit-backdrop-filter: var(--blur-glass); 
            z-index: 2000; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            opacity: 0; 
            pointer-events: none; 
            transition: var(--transition-fluid); 
            padding: 32px; 
        }
        
        .modal-blur-overlay.active { 
            opacity: 1;
            pointer-events: auto; 
        }
        
        .modal-window-body { 
            background: var(--bg-card-elevated); 
            border: 1px solid var(--border-primary); 
            border-radius: var(--radius-xl);
            padding: 0; 
            width: 100%; 
            max-width: 1040px; 
            box-shadow: var(--shadow-luxury); 
            transform: scale(0.94) translateY(40px); 
            transition: var(--transition-fluid); 
            max-height: 90vh; 
            overflow: hidden;
            position: relative;
        }
        
        .modal-blur-overlay.active .modal-window-body { 
            transform: scale(1) translateY(0);
        }

        .modal-grid-container {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
        }

        .modal-media-wrapper {
            background: #09090b;
            height: 100%;
            min-height: 580px;
            position: relative;
        }

        .modal-media-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-details-wrapper {
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .modal-status-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .status-pill {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--whatsapp-green);
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-pill::before {
            content: '';
            width: 8px; height: 8px;
            background: var(--whatsapp-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--whatsapp-green);
        }

        .modal-main-title {
            font-family: var(--font-display);
            color: var(--text-title);
            font-size: 2.6rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 24px;
            letter-spacing: -1px;
        }

        .modal-description {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text-body);
            margin-bottom: 36px;
        }

        .modal-footer-actions {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .modal-close-trigger {
            position: absolute;
            top: 28px; right: 28px;
            width: 48px; height: 48px;
            border-radius: 50%;
            background: rgba(3,3,3,0.6);
            border: 1px solid var(--border-primary);
            color: white;
            display: grid;
            place-items: center;
            cursor: pointer;
            z-index: 10;
            transition: var(--transition-bounce);
        }

        .modal-close-trigger:hover {
            background: #ffffff;
            color: #000000;
            transform: rotate(90deg) scale(1.05);
        }

        /* KEYFRAMES CORE */
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(50px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* RESPONSIVE SYSTEM EXCLUSIVO */
        @media(max-width: 1200px) {
            .premium-banner { padding: 100px 60px; min-height: 460px; }
            .premium-banner h1 { font-size: 3.8rem; }
            .shop-layout { grid-template-columns: 280px 1fr; gap: 40px; }
        }

        @media(max-width: 1024px) {
            .shop-layout { 
                grid-template-columns: 1fr; 
                gap: 50px; 
                padding: 40px 32px 120px 32px;
            }
            .sidebar-sticky { position: static; gap: 32px; }
            .hero-container { padding: 0 32px; }
            .modal-window-body { max-width: 720px; max-height: 85vh; overflow-y: auto; }
            .modal-grid-container { grid-template-columns: 1fr; }
            .modal-media-wrapper { min-height: 380px; height: 380px; }
            .modal-details-wrapper { padding: 44px; }
        }

        @media(max-width: 600px) {
            .nav-inner { padding: 20px 24px; }
            .shop-layout { padding: 30px 20px 100px 20px; }
            .hero-container { padding: 0 20px; margin-top: 110px; }
            .premium-banner { padding: 80px 32px; border-radius: var(--radius-lg); }
            .premium-banner h1 { font-size: 2.6rem; letter-spacing: -1.5px; }
            .premium-banner p { font-size: 1.1rem; }
            .products-showcase { grid-template-columns: 1fr; gap: 32px; }
            .modal-details-wrapper { padding: 32px 24px; }
            .modal-main-title { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header class="navbar" id="main-navbar">
        <div class="nav-inner">
            <a class="nav-logo" onclick="window.location.reload()">
                <div class="logo-symbol">A</div>
                <span>ANGELICA MARKET</span>
            </a>
            <div class="nav-menu">
                <button class="nav-action-btn" id="client-theme-toggle" title="Cambiar Interfaz">
                    <i class="fa-solid fa-sun"></i>
                </button>
            </div>
        </div>
    </header>

    <section class="hero-container">
        <div class="premium-banner" id="client-banner-target">
            <h1>Elegancia, Confianza y Calidad</h1>
            <p>Explora nuestra selección de productos premium diseñados para cumplir las más altas exigencias comerciales.</p>
            <div class="hero-action-wrapper">
                <a href="#catalog-showcase-section" class="btn btn-accent">Explorar Catálogo <i class="fa-solid fa-arrow-down"></i></a>
            </div>
        </div>
    </section>

    <div class="shop-layout" id="catalog-showcase-section">
        <aside class="shop-sidebar">
            <div class="sidebar-sticky">
                <div>
                    <h4 class="sidebar-block-title">Buscador Instantáneo</h4>
                    <div class="search-container">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="shop-live-search" class="custom-search" placeholder="Buscar pieza o modelo...">
                    </div>
                </div>
                <div>
                    <h4 class="sidebar-block-title">Navegación por Líneas</h4>
                    <div class="category-list-group" id="client-category-injector">
                        </div>
                </div>
            </div>
        </aside>
        
        <main>
            <div class="products-showcase" id="client-gallery-injector">
                </div>
        </main>
    </div>

    <div class="modal-blur-overlay" id="md-client-detail">
        <div class="modal-window-body">
            <div class="modal-close-trigger" onclick="closeActiveModals()">
                <i class="fa-solid fa-xmark"></i>
            </div>
            <div class="modal-grid-container" id="target-modal-client-detail">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONEXIÓN DIRECTA EXCLUSIVA WHATSAPP
        const WHATSAPP_NUMBER = "50255146055";

        // CONFIGURACIÓN OFICIAL FIRESTORE AUTENTICADA
        const firebaseConfig = {
            apiKey: "AIzaSyAdLGsavsans6OmLeyD_9TndcrAObDQgqA",
            authDomain: "bitacora-3fc27.firebaseapp.com",
            projectId: "bitacora-3fc27",
            storageBucket: "bitacora-3fc27.firebasestorage.app",
            messagingSenderId: "921769640813",
            appId: "1:921769640813:web:20173a75ebc52230595064",
            measurementId: "G-R9MPVSH7MW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let dataset = { 
            products: [], 
            categories: [], 
            promos: [], 
            banners: [], 
            currentCategoryFilter: 'all', 
            searchString: '' 
        };
        
        const placeholderImg = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='none' stroke='%23333' stroke-width='1'><rect width='18' height='18' x='3' y='3' rx='2'/><circle cx='9' cy='9' r='2'/><path d='m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21'/></svg>";

        window.addEventListener('DOMContentLoaded', () => {
            setupThemeControl();
            registerRealtimePipelines();
            setupNavbarScrollEffect();
            
            document.getElementById('shop-live-search').addEventListener('input', (e) => {
                dataset.searchString = e.target.value.toLowerCase().trim();
                renderClientGallery();
            });
        });

        function setupNavbarScrollEffect() {
            const navbar = document.getElementById('main-navbar');
            window.addEventListener('scroll', () => {
                if(window.scrollY > 40) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });
        }

        function setupThemeControl() {
            const theme = localStorage.getItem('am-client-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            
            const btnToggle = document.getElementById('client-theme-toggle');
            btnToggle.innerHTML = theme === 'dark' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
            
            btnToggle.addEventListener('click', () => {
                const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('am-client-theme', next);
                btnToggle.innerHTML = next === 'dark' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
            });
        }

        function registerRealtimePipelines() {
            onSnapshot(query(collection(db, "products"), orderBy("createdAt", "desc")), (snap) => {
                dataset.products = [];
                snap.forEach(doc => dataset.products.push({ id: doc.id, ...doc.data() }));
                renderClientGallery();
                renderClientSidebarCategories();
            });

            onSnapshot(query(collection(db, "categories"), orderBy("name")), (snap) => {
                dataset.categories = [];
                snap.forEach(doc => dataset.categories.push({ id: doc.id, ...doc.data() }));
                renderClientSidebarCategories();
            });

            onSnapshot(collection(db, "promos"), (snap) => {
                dataset.promos = [];
                snap.forEach(doc => dataset.promos.push({ id: doc.id, ...doc.data() }));
                renderClientGallery();
            });

            onSnapshot(collection(db, "banners"), (snap) => {
                dataset.banners = [];
                snap.forEach(doc => dataset.banners.push({ id: doc.id, ...doc.data() }));
                renderPublicBillboard();
            });
        }

        function renderPublicBillboard() {
            const container = document.getElementById('client-banner-target');
            if(dataset.banners.length === 0) {
                container.innerHTML = `
                    <h1>Elegancia, Confianza y Calidad</h1>
                    <p>Explora nuestra selección de productos premium diseñados para cumplir las más altas exigencias comerciales.</p>
                    <div class="hero-action-wrapper"><a href="#catalog-showcase-section" class="btn btn-accent">Explorar Catálogo <i class="fa-solid fa-arrow-down"></i></a></div>
                `;
                container.style.background = "linear-gradient(-45deg, #050505, #0f0f15, #020202, #08080c)";
                container.style.backgroundSize = "400% 400%";
                return;
            }
            const currentB = dataset.banners[0];
            container.innerHTML = `
                <h1>${currentB.title}</h1>
                <p>${currentB.subtitle}</p>
                <div class="hero-action-wrapper"><a href="#catalog-showcase-section" class="btn btn-accent">Explorar Catálogo <i class="fa-solid fa-arrow-down"></i></a></div>
            `;
            container.style.background = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.85)), url(${currentB.image}) center/cover`;
        }

        function renderClientSidebarCategories() {
            const target = document.getElementById('client-category-injector');
            let html = `<div class="category-nav-link ${dataset.currentCategoryFilter === 'all' ? 'active' : ''}" onclick="applyCategoryFilter('all')"><span>Todos los Ítems</span><span class="count-pill">${dataset.products.length}</span></div>`;
            dataset.categories.forEach(c => {
                const count = dataset.products.filter(p => p.category === c.name).length;
                html += `<div class="category-nav-link ${dataset.currentCategoryFilter === c.name ? 'active' : ''}" onclick="applyCategoryFilter('${c.name}')"><span>${c.name}</span><span class="count-pill">${count}</span></div>`;
            });
            target.innerHTML = html;
        }

        window.applyCategoryFilter = function(catName) {
            dataset.currentCategoryFilter = catName;
            renderClientSidebarCategories();
            renderClientGallery();
        };

        function renderClientGallery() {
            const injector = document.getElementById('client-gallery-injector');
            injector.innerHTML = '';

            let filtered = dataset.products.filter(p => {
                const matchesCat = (dataset.currentCategoryFilter === 'all' || p.category === dataset.currentCategoryFilter);
                const matchesSearch = (!dataset.searchString || p.name.toLowerCase().includes(dataset.searchString) || (p.description && p.description.toLowerCase().includes(dataset.searchString)));
                return matchesCat && matchesSearch;
            });

            if(filtered.length === 0) {
                injector.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:120px 20px; color:var(--text-muted); font-size:1rem;"><i class="fa-solid fa-box-open" style="font-size:2.5rem; margin-bottom:20px; display:block; opacity:0.3;"></i>No hay piezas registradas en esta línea.</div>`;
                return;
            }

            filtered.forEach((p, index) => {
                const promo = dataset.promos.find(pr => pr.title.toLowerCase() === p.category.toLowerCase());
                const finalPrice = promo ? (p.price * (1 - (promo.pct / 100))) : p.price;

                const card = document.createElement('div');
                card.className = 'product-luxury-card';
                card.style.opacity = '0';
                card.style.transform = 'translateY(30px)';
                card.style.animation = `slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) ${index * 0.05}s forwards`;
                
                card.innerHTML = `
                    <div class="card-media-wrapper" onclick="triggerProductDetailedInsight('${p.id}')" style="cursor:pointer;">
                        <div class="badge-container">
                            <span class="whatsapp-direct-badge"><i class="fa-brands fa-whatsapp"></i> WhatsApp Directo</span>
                            ${promo ? `<span class="discount-ribbon">-${promo.pct}% OFF</span>` : ''}
                        </div>
                        ${p.stock <= 0 ? `<div class="stock-out-overlay"><span class="stock-out-badge">Agotado</span></div>` : ''}
                        <img src="${p.image || placeholderImg}" loading="lazy">
                    </div>
                    <div class="card-info">
                        <span class="card-meta-tag">${p.category}</span>
                        <h3 class="card-main-title">${p.name}</h3>
                        <div class="card-pricing-block">
                            <span class="price-current">Q${finalPrice.toFixed(2)}</span>
                            ${promo ? `<span class="price-was">Q${p.price.toFixed(2)}</span>` : ''}
                        </div>
                        <div style="display:grid; grid-template-columns: 1fr auto; gap:14px;">
                            <button class="btn btn-whatsapp" onclick="redirectToWhatsAppDirect('${p.id}')" ${p.stock <= 0 ? 'disabled style="opacity:0.4; cursor:not-allowed;"' : ''}>
                                <i class="fa-brands fa-whatsapp"></i> Comprar por WhatsApp
                            </button>
                            <button class="btn btn-outline" style="padding:18px;" title="Ver Detalle" onclick="triggerProductDetailedInsight('${p.id}')">
                                <i class="fa-solid fa-expand"></i>
                            </button>
                        </div>
                    </div>`;
                injector.appendChild(card);
            });
        }

        window.triggerProductDetailedInsight = function(id) {
            const p = dataset.products.find(x => x.id === id);
            if(!p) return;
            const promo = dataset.promos.find(pr => pr.title.toLowerCase() === p.category.toLowerCase());
            const finalPrice = promo ? (p.price * (1 - (promo.pct / 100))) : p.price;

            document.getElementById('target-modal-client-detail').innerHTML = `
                <div class="modal-media-wrapper">
                    <img src="${p.image || placeholderImg}">
                </div>
                <div class="modal-details-wrapper">
                    <div class="modal-status-row">
                        <span class="card-meta-tag" style="margin-bottom:0;">${p.category}</span>
                        <span class="status-pill">${p.stock > 0 ? 'Disponible' : 'Agotado'}</span>
                    </div>
                    <h2 class="modal-main-title">${p.name}</h2>
                    <p class="modal-description">${p.description || 'Este exclusivo artículo no cuenta con una descripción detallada en este momento.'}</p>
                    <div class="card-pricing-block">
                        <span class="price-current" style="font-size:2.2rem;">Q${finalPrice.toFixed(2)}</span>
                        ${promo ? `<span class="price-was" style="font-size:1.3rem;">Q${p.price.toFixed(2)}</span>` : ''}
                    </div>
                    <div class="modal-footer-actions">
                        <button class="btn btn-whatsapp" style="width:100%; padding:20px;" onclick="redirectToWhatsAppDirect('${p.id}')" ${p.stock <= 0 ? 'disabled style="opacity:0.4; cursor:not-allowed;"' : ''}>
                            <i class="fa-brands fa-whatsapp"></i> Solicitar por WhatsApp
                        </button>
                    </div>
                </div>`;
            openModal('md-client-detail');
        };

        window.redirectToWhatsAppDirect = function(id) {
            const p = dataset.products.find(x => x.id === id);
            if(!p) return;

            const promo = dataset.promos.find(pr => pr.title.toLowerCase() === p.category.toLowerCase());
            const finalPrice = promo ? (p.price * (1 - (promo.pct / 100))) : p.price;
            const cleanDescription = p.description ? p.description.substring(0, 150) + '...' : 'Sin descripción adicional';

            const text = `🛍️ SOLICITUD DE PRODUCTO\n📦 Nombre:\n[${p.name.toUpperCase()}]\n🏷️ Categoría:\n[${p.category.toUpperCase()}]\n💰 Precio:\n[Q${finalPrice.toFixed(2)}]\n📝 Descripción:\n[${cleanDescription}]\n\nHola, estoy interesado en este producto.\n¿Podrían brindarme más información?`;

            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(text)}`, '_blank');
        };

        window.openModal = id => {
            document.getElementById(id).classList.add('active');
            document.body.style.overflow = 'hidden';
        };
        
        window.closeActiveModals = () => {
            document.querySelectorAll('.modal-blur-overlay').forEach(m => m.classList.remove('active'));
            document.body.style.overflow = '';
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeActiveModals();
        });
    </script>
</body>
</html>
